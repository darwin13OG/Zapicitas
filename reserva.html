<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Reserva tu Turno</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(147, 51, 234, 0.3); border-radius: 2px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const START_HOUR = 8;
    const END_HOUR = 18;
    const SLOT_INTERVAL = 30;

    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + SLOT_INTERVAL <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        slots.push({ formatted: `${displayHour.toString().padStart(2, '0')}:${displayMinute} ${ampm}`, rawValue: `${hour.toString().padStart(2, '0')}:${displayMinute}` });
        currentMinutes += SLOT_INTERVAL;
      }
      return slots;
    };

    const getSpanishDayName = (date) => ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][date.getDay()];
    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        days.push({
          isoString: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`,
          dayName: getSpanishDayName(date), dayNumber: date.getDate()
        });
      }
      return days;
    };

    function App() {
      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(START_HOUR, END_HOUR), []);

      const [targetBarberiaId, setTargetBarberiaId] = useState('');
      const [barberiaName, setBarberiaName] = useState('ZapiCitas');
      const [allBarberias, setAllBarberias] = useState([]);
      const [hasIdInUrl, setHasIdInUrl] = useState(false);

      const [selectedDate, setSelectedDate] = useState(daysList[0].isoString);
      const [selectedTime, setSelectedTime] = useState('');
      const [clientName, setClientName] = useState('');
      const [clientPhone, setClientPhone] = useState('');
      const [bookingSuccess, setBookingSuccess] = useState(false);
      const [bookedAppointments, setBookedAppointments] = useState([]);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id');

        async function resolverNegocio() {
          if (idParam) {
            setHasIdInUrl(true);
            setTargetBarberiaId(idParam);
            const { data } = await supabase.from('perfil_barberia').select('nombre_negocio').eq('id', idParam).single();
            if (data) setBarberiaName(data.nombre_negocio);
          } else {
            setHasIdInUrl(false);
            const { data } = await supabase.from('perfil_barberia').select('id, nombre_negocio');
            if (data && data.length > 0) {
              setAllBarberias(data);
              setTargetBarberiaId(data[0].id);
              setBarberiaName(data[0].nombre_negocio);
            }
          }
        }
        resolverNegocio();
      }, []);

      useEffect(() => {
        if (!hasIdInUrl && targetBarberiaId && allBarberias.length > 0) {
          const match = allBarberias.find(b => b.id === targetBarberiaId);
          if (match) setBarberiaName(match.nombre_negocio);
        }
      }, [targetBarberiaId, allBarberias, hasIdInUrl]);

      useEffect(() => {
        if (!targetBarberiaId) return;
        async function fetchOcupados() {
          setLoading(true);
          const { data } = await supabase.from('citas')
            .select('hora_turno')
            .eq('barberia_id', targetBarberiaId)
            .eq('fecha_turno', selectedDate);
          
          if (data) setBookedAppointments(data.map(c => c.hora_turno));
          setLoading(false);
        }
        fetchOcupados();
      }, [selectedDate, targetBarberiaId]);

      const handleConfirmBooking = async (e) => {
        e.preventDefault();
        if (!targetBarberiaId || !selectedTime || !clientName.trim() || !clientPhone.trim()) return;

        const { error } = await supabase.from('citas').insert([{
          barberia_id: targetBarberiaId,
          nombre_cliente: clientName.trim(),
          celular_cliente: clientPhone.trim(),
          fecha_turno: selectedDate,
          hora_turno: selectedTime,
          estado: 'pending'
        }]);

        if (error) alert("Error: " + error.message);
        else setBookingSuccess(true);
      };

      return (
        <div className="max-w-md mx-auto w-full px-4 py-6 flex flex-col min-h-screen justify-between">
          <header className="text-center py-4 space-y-1">
            <span className="text-[10px] uppercase font-bold tracking-widest text-purple-400 bg-purple-950/40 border border-purple-900/30 px-3 py-1 rounded-full">Reserva en Línea</span>
            <h1 className="text-2xl font-black text-white mt-2">💈 {barberiaName}</h1>
            <p className="text-xs text-slate-400">Separa tu espacio en tiempo real.</p>
          </header>

          {bookingSuccess ? (
            <div className="my-auto py-8 px-6 bg-slate-900/40 border border-slate-900 rounded-3xl text-center space-y-4">
              <h2 className="text-xl font-bold text-emerald-400">¡Turno Reservado!</h2>
              <div className="bg-slate-950 border border-slate-850 p-4 rounded-xl text-left space-y-1 text-xs">
                <p><strong className="text-slate-400">Día:</strong> {selectedDate}</p>
                <p><strong className="text-slate-400">Hora:</strong> {selectedTime}</p>
                <p><strong className="text-slate-400">Nombre:</strong> {clientName}</p>
              </div>
              <button onClick={() => { setBookingSuccess(false); setClientName(''); setClientPhone(''); setSelectedTime(''); }} className="w-full py-3 bg-purple-600 font-bold rounded-xl text-xs">Reservar otro turno</button>
            </div>
          ) : (
            <div className="space-y-5 my-auto">
              {!hasIdInUrl && allBarberias.length > 0 && (
                <div className="space-y-1.5">
                  <label className="text-[10px] font-bold text-slate-500 uppercase">Selecciona el Local</label>
                  <select value={targetBarberiaId} onChange={(e) => setTargetBarberiaId(e.target.value)} className="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-xs text-white outline-none">
                    {allBarberias.map(b => <option key={b.id} value={b.id}>{b.nombre_negocio}</option>)}
                  </select>
                </div>
              )}

              <div className="space-y-2">
                <label className="text-[10px] font-bold text-slate-500 uppercase block">1. Selecciona el Día</label>
                <div className="flex space-x-2 overflow-x-auto pb-1 custom-scrollbar">
                  {daysList.map((d) => (
                    <button key={d.isoString} type="button" onClick={() => { setSelectedDate(d.isoString); setSelectedTime(''); }} className={`px-4 py-2.5 rounded-2xl border flex flex-col items-center shrink-0 min-w-[60px] ${selectedDate === d.isoString ? 'bg-purple-600 border-purple-500 text-white' : 'bg-slate-900/40 border-slate-900 text-slate-400'}`}>
                      <span className="text-[8px] uppercase font-bold">{d.dayName}</span>
                      <span className="text-sm font-extrabold mt-0.5">{d.dayNumber}</span>
                    </button>
                  ))}
                </div>
              </div>

              <div className="space-y-2">
                <label className="text-[10px] font-bold text-slate-500 uppercase block">2. Selecciona la Hora</label>
                {loading ? (
                  <div className="text-center py-4 text-xs text-slate-500">Buscando espacios...</div>
                ) : (
                  <div className="grid grid-cols-3 gap-1.5 max-h-[140px] overflow-y-auto custom-scrollbar p-2 bg-slate-900/20 border border-slate-900 rounded-2xl">
                    {timeSlots.map((slot) => {
                      const isBooked = bookedAppointments.includes(slot.formatted);
                      if (isBooked) return <div key={slot.rawValue} className="py-2.5 border border-slate-950 bg-slate-950/40 text-slate-700 text-[10px] text-center line-through rounded-xl">Ocupado</div>;
                      return <button key={slot.rawValue} type="button" onClick={() => setSelectedTime(slot.formatted)} className="py-2.5 border text-[10px] font-bold text-center rounded-xl bg-slate-950 border-slate-850 text-slate-300">{slot.formatted}</button>;
                    })}
                  </div>
                )}
              </div>

              <form onSubmit={handleConfirmBooking} className="space-y-3 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl">
                <input type="text" required placeholder="Tu nombre" value={clientName} onChange={(e) => setClientName(e.target.value)} className="w-full px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-200 outline-none" />
                <input type="tel" required placeholder="Tu número de celular" value={clientPhone} onChange={(e) => setClientPhone(e.target.value)} className="w-full px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-200 outline-none" />
                <button type="submit" disabled={!selectedTime || !clientName.trim() || !clientPhone.trim()} className="w-full py-3 bg-purple-600 font-bold rounded-xl text-xs disabled:opacity-40">
                  {selectedTime ? `Agendar para las ${selectedTime}` : 'Elige una hora libre'}
                </button>
              </form>
            </div>
          )}
          <footer className="py-4 text-center text-[9px] text-slate-600 border-t border-slate-900 mt-auto"><p>ZapiCitas Agendamiento © 2026</p></footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
