<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Reserva tu Turno</title>
  
  <!-- Tailwind CSS v4 -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- React & Babel para la interactividad móvil -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      height: 4px;
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(147, 51, 234, 0.3);
      border-radius: 2px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const START_HOUR = 8;          // 8:00 AM
    const END_HOUR = 18;          // 6:00 PM
    const SLOT_INTERVAL = 30;     // Bloques de 30 minutos

    // Generador de horarios idéntico al administrador
    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + SLOT_INTERVAL <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        const formatted = `${displayHour.toString().padStart(2, '0')}:${displayMinute} ${ampm}`;
        const rawValue = `${hour.toString().padStart(2, '0')}:${displayMinute}`;
        slots.push({ formatted, rawValue });
        currentMinutes += SLOT_INTERVAL;
      }
      return slots;
    };

    const getSpanishDayName = (date) => {
      const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
      return days[date.getDay()];
    };

    const getSpanishMonthName = (date) => {
      const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
      return months[date.getMonth()];
    };

    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        days.push({
          isoString: `${yyyy}-${mm}-${dd}`,
          dayName: getSpanishDayName(date),
          dayNumber: date.getDate(),
          monthName: getSpanishMonthName(date)
        });
      }
      return days;
    };

    function App() {
      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(START_HOUR, END_HOUR), []);

      // Estados de la reserva del cliente
      const [selectedDate, setSelectedDate] = useState(daysList[0].isoString);
      const [selectedTime, setSelectedTime] = useState('');
      const [clientName, setClientName] = useState('');
      const [clientPhone, setClientPhone] = useState('');
      const [bookingSuccess, setBookingSuccess] = useState(false);

      // Simulación de citas ocupadas en la base de datos para la prueba
      const [bookedAppointments] = useState([
        { date: daysList[0].isoString, timeSlot: '09:00 AM' },
        { date: daysList[0].isoString, timeSlot: '11:30 AM' }
      ]);

      const handleConfirmBooking = (e) => {
        e.preventDefault();
        if (!selectedTime || !clientName.trim() || !clientPhone.trim()) {
          alert('Por favor, completa todos los campos y selecciona un horario.');
          return;
        }
        
        // Aquí conectaremos la inserción real a Supabase en el futuro
        setBookingSuccess(true);
      };

      const selectedDayDetails = daysList.find(d => d.isoString === selectedDate);

      return (
        <div className="max-w-md mx-auto w-full px-4 py-6 flex flex-col min-h-screen justify-between">
          
          {/* Cabecera de la Barbería */}
          <header className="text-center py-4 space-y-1">
            <span className="text-[10px] uppercase font-bold tracking-widest text-purple-400 bg-purple-950/40 border border-purple-900/30 px-3 py-1 rounded-full">
              Reserva en Línea
            </span>
            <h1 className="text-2xl font-black text-white tracking-tight mt-2">💈 Barbería El Tigre</h1>
            <p className="text-xs text-slate-400">Selecciona tu espacio y asegura tu corte en segundos.</p>
          </header>

          {/* Estado de Éxito al Agendar */}
          {bookingSuccess ? (
            <div className="my-auto py-8 px-6 bg-slate-900/40 border border-slate-900 rounded-3xl text-center space-y-6 animate-fadeIn">
              <div className="h-16 w-16 bg-emerald-500/10 border border-emerald-500/30 rounded-full flex items-center justify-center mx-auto">
                <svg className="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <div className="space-y-2">
                <h2 className="text-xl font-bold text-white">¡Turno Reservado!</h2>
                <p className="text-xs text-slate-400">Tu cita ha sido agendada con éxito en el sistema.</p>
              </div>
              
              <div className="bg-slate-950 border border-slate-850 p-4 rounded-2xl text-left space-y-2 text-xs">
                <p className="text-slate-400"><strong className="text-slate-200">Fecha:</strong> {selectedDayDetails?.dayName} {selectedDayDetails?.dayNumber} de {selectedDayDetails?.monthName}</p>
                <p className="text-slate-400"><strong className="text-slate-200">Hora:</strong> {selectedTime}</p>
                <p className="text-slate-400"><strong className="text-slate-200">Cliente:</strong> {clientName}</p>
              </div>

              <button 
                onClick={() => { setBookingSuccess(false); setClientName(''); setClientPhone(''); setSelectedTime(''); }}
                className="w-full py-3.5 bg-slate-900 hover:bg-slate-850 border border-slate-800 text-slate-300 font-bold rounded-xl text-xs transition-all"
              >
                Reservar otro turno
              </button>
            </div>
          ) : (
            
            // Formulario de Reserva Activo
            <div className="space-y-6 my-auto">
              
              {/* Paso 1: Selector de Fecha Horizontal */}
              <div className="space-y-2">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">1. Selecciona el Día</label>
                <div className="flex space-x-2 overflow-x-auto pb-1 custom-scrollbar">
                  {daysList.map((d) => {
                    const isSelected = selectedDate === d.isoString;
                    return (
                      <button
                        key={d.isoString}
                        type="button"
                        onClick={() => { setSelectedDate(d.isoString); setSelectedTime(''); }}
                        className={`px-4 py-3 rounded-2xl border flex flex-col items-center shrink-0 min-w-[65px] transition-all ${isSelected ? 'bg-purple-600 border-purple-500 text-white shadow-md shadow-purple-600/10' : 'bg-slate-900/40 border-slate-900 text-slate-400'}`}
                      >
                        <span className="text-[9px] uppercase font-bold tracking-tight opacity-70">{d.dayName}</span>
                        <span className="text-base font-extrabold mt-0.5">{d.dayNumber}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Paso 2: Selector de Horas Disponibles */}
              <div className="space-y-2">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">2. Selecciona la Hora</label>
                <div className="grid grid-cols-3 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-2 bg-slate-900/20 border border-slate-900 rounded-2xl">
                  {timeSlots.map((slot) => {
                    const isBooked = bookedAppointments.some(app => app.date === selectedDate && app.timeSlot === slot.formatted);
                    const isSelected = selectedTime === slot.formatted;

                    if (isBooked) {
                      return (
                        <div 
                          key={slot.rawValue} 
                          className="py-3 border border-slate-950 bg-slate-950/40 text-slate-700 text-xs text-center line-through rounded-xl select-none"
                        >
                          Ocupado
                        </div>
                      );
                    }

                    return (
                      <button
                        key={slot.rawValue}
                        type="button"
                        onClick={() => setSelectedTime(slot.formatted)}
                        className={`py-3 border text-xs font-bold text-center rounded-xl transition-all ${isSelected ? 'bg-purple-600/20 border-purple-500 text-purple-300' : 'bg-slate-950 border-slate-850 text-slate-300 hover:border-slate-700'}`}
                      >
                        {slot.formatted}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Paso 3: Datos de Contacto */}
              <form onSubmit={handleConfirmBooking} className="space-y-4 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block -mb-2">3. Tus Datos</label>
                
                <div className="space-y-3 pt-2">
                  <input 
                    type="text" 
                    required 
                    placeholder="Tu nombre completo" 
                    value={clientName}
                    onChange={(e) => setClientName(e.target.value)}
                    className="w-full px-4 py-3 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-xs outline-none text-slate-200 transition-all"
                  />
                  <input 
                    type="tel" 
                    required 
                    placeholder="Tu número de celular" 
                    value={clientPhone}
                    onChange={(e) => setClientPhone(e.target.value)}
                    className="w-full px-4 py-3 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-xs outline-none text-slate-200 transition-all"
                  />
                </div>

                {/* Botón de Confirmación de Acción */}
                <button 
                  type="submit"
                  className="w-full py-4 mt-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl text-xs shadow-lg shadow-purple-600/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                  disabled={!selectedTime || !clientName.trim() || !clientPhone.trim()}
                >
                  {selectedTime ? `Confirmar Turno para las ${selectedTime}` : 'Selecciona una hora para continuar'}
                </button>
              </form>

            </div>
          )}

          <footer className="py-4 text-center text-[9px] text-slate-600 border-t border-slate-900 mt-auto">
            <p>ZapiCitas Agendamiento © 2026</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
