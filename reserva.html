<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Reserva tu Turno</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function App() {
      const [barberiaId, setBarberiaId] = useState('');
      const [barberiaName, setBarberiaName] = useState('Barbería');
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [selectedTime, setSelectedTime] = useState('');
      const [clientName, setClientName] = useState('');
      const [clientPhone, setClientPhone] = useState('');
      const [success, setSuccess] = useState(false);

      useEffect(() => {
        const id = new URLSearchParams(window.location.search).get('id');
        if (id) {
          setBarberiaId(id);
          supabase.from('perfil_barberia').select('nombre_negocio').eq('id', id).single()
            .then(({ data }) => data && setBarberiaName(data.nombre_negocio));
        }
      }, []);

      const handleReserva = async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('citas').insert([{ barberia_id: barberiaId, nombre_cliente: clientName, celular_cliente: clientPhone, fecha_turno: selectedDate, hora_turno: selectedTime, estado: 'pending' }]);
        if (!error) setSuccess(true);
      };

      if (success) return (
        <div className="max-w-md mx-auto p-10 text-center space-y-4">
          <h1 className="text-2xl font-bold text-emerald-400">¡Turno Agendado!</h1>
          <p className="text-slate-400">Gracias {clientName}, te esperamos.</p>
          <button onClick={() => location.reload()} className="w-full py-3 bg-purple-600 rounded-xl">Volver</button>
        </div>
      );

      return (
        <div className="max-w-md mx-auto px-6 py-10 space-y-8">
          <header className="text-center">
            <h1 className="text-3xl font-black">{barberiaName}</h1>
            <p className="text-slate-500">Reserva tu espacio rápido</p>
          </header>

          <form onSubmit={handleReserva} className="space-y-4">
            <div className="space-y-2">
              <label className="text-xs font-bold text-slate-500 uppercase">Día:</label>
              <input type="date" required value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-white outline-none" />
            </div>
            <div className="space-y-2">
              <label className="text-xs font-bold text-slate-500 uppercase">Hora:</label>
              <input type="time" required value={selectedTime} onChange={e => setSelectedTime(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-white outline-none" />
            </div>
            <input type="text" placeholder="Tu nombre" required value={clientName} onChange={e => setClientName(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-white outline-none" />
            <input type="tel" placeholder="Tu celular" required value={clientPhone} onChange={e => setClientPhone(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-white outline-none" />
            <button type="submit" className="w-full py-4 bg-purple-600 rounded-2xl font-bold">Agendar Ahora</button>
          </form>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
