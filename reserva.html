<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reserva | ZapiCitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
  <div id="app" class="max-w-md mx-auto px-6 py-10 space-y-8" v-cloak>
    
    <header class="text-center">
      <h1 class="text-3xl font-black text-white tracking-tight uppercase">{{ bizName }}</h1>
      <div v-if="pausado" class="mt-4 p-4 bg-rose-500/10 border border-rose-500/30 rounded-2xl">
        <p class="text-rose-400 font-bold text-sm">Lo sentimos, no estamos recibiendo citas ahora mismo.</p>
      </div>
    </header>

    <!-- NAVEGACION PORTAL -->
    <div class="flex bg-slate-900 p-1 rounded-2xl border border-slate-800">
      <button @click="tab = 'reserva'" :class="tab === 'reserva' ? 'bg-purple-600 text-white' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-bold uppercase text-[10px] transition-all">Reservar</button>
      <button @click="tab = 'consulta'" :class="tab === 'consulta' ? 'bg-purple-600 text-white' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-bold uppercase text-[10px] transition-all">Mi Cita</button>
    </div>

    <!-- PESTAÑA: AGENDAR -->
    <div v-if="tab === 'reserva' && !pausado" class="space-y-6">
      <form @submit.prevent="save" class="space-y-4">
        <div class="space-y-1">
          <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Día del turno</label>
          <input v-model="form.date" type="date" required class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Hora del turno</label>
          <input v-model="form.time" type="time" required class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        </div>
        <input v-model="form.cli" type="text" placeholder="Tu nombre" required class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        <input v-model="form.tel" type="tel" placeholder="Tu celular" required class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        <button type="submit" class="w-full py-4 bg-purple-600 rounded-2xl font-bold shadow-lg shadow-purple-600/20 active:scale-95">AGENDAR TURNO</button>
      </form>
    </div>

    <!-- PESTAÑA: CONSULTAR/CANCELAR -->
    <div v-if="tab === 'consulta'" class="space-y-6 animate-in fade-in duration-300">
      <div class="space-y-3">
        <p class="text-xs text-slate-400 text-center">Busca tu cita para ver el estado o cancelar</p>
        <div class="flex gap-2">
          <input v-model="searchTel" type="tel" placeholder="Tu celular" class="flex-1 p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
          <button @click="consultar" class="bg-purple-600 px-6 rounded-2xl font-bold shadow-lg">🔍</button>
        </div>
      </div>

      <div v-for="c in misCitas" :key="c.id" class="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4 shadow-xl">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-xs text-slate-500 font-bold uppercase">{{ c.fecha_turno }}</p>
            <p class="text-xl font-black text-white">{{ c.hora_turno }}</p>
          </div>
          <span :class="c.estado === 'paid' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'" class="px-3 py-1 rounded-full text-[9px] font-bold uppercase">
            {{ c.estado === 'paid' ? 'Pagado' : 'Pendiente' }}
          </span>
        </div>
        <div class="pt-4 border-t border-slate-800 flex flex-col gap-2">
          <button @click="cancelar(c.id)" class="w-full py-3 bg-slate-800 text-rose-400 rounded-xl text-[10px] font-bold border border-rose-900/30 uppercase tracking-widest">Cancelar Turno</button>
        </div>
      </div>
    </div>
  </div>

  <style>[v-cloak] { display: none; }</style>

  <script>
    const { createApp, ref, onMounted } = Vue;
    const sb = supabase.createClient("https://tsasorwwbbscnbvoyyhf.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8");

    createApp({
      setup() {
        const tab = ref('reserva');
        const bizId = ref('');
        const bizName = ref('...');
        const pausado = ref(false);
        const form = ref({ date: '', time: '', cli: '', tel: '' });
        const searchTel = ref('');
        const misCitas = ref([]);

        onMounted(async () => {
          const id = new URLSearchParams(window.location.search).get('id');
          if (id) {
            bizId.value = id;
            const { data } = await sb.from('perfil_barberia').select('*').eq('id', id).single();
            if(data) { bizName.value = data.nombre_negocio; pausado.value = data.esta_pausado; }
          }
        });

        const save = async () => {
          await sb.from('citas').insert([{ barberia_id: bizId.value, nombre_cliente: form.value.cli, celular_cliente: form.value.tel, fecha_turno: form.value.date, hora_turno: form.value.time, estado: 'pending' }]);
          alert("¡Turno reservado con éxito!");
          location.reload();
        };

        const consultar = async () => {
          if(!searchTel.value) return;
          const { data } = await sb.from('citas').select('*').eq('barberia_id', bizId.value).eq('celular_cliente', searchTel.value);
          misCitas.value = data || [];
          if(misCitas.value.length === 0) alert("No hay citas pendientes con este número.");
        };

        const cancelar = async (id) => {
          if(confirm('¿Deseas cancelar tu turno? Esto lo borrará de la agenda.')) {
            await sb.from('citas').delete().eq('id', id);
            alert("Turno cancelado.");
            consultar();
          }
        };

        return { tab, bizName, pausado, form, searchTel, misCitas, save, consultar, cancelar };
      }
    }).mount('#app');
  </script>
</body>
</html>
