<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Reserva tu Turno</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(147, 51, 234, 0.3); border-radius: 2px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ID de barbería por defecto para las pruebas en producción
    const DEPLOYED_BARBERIA_ID = "ef76e82a-e2ba-4b47-97be-43a968600000"; 

    const START_HOUR = 8;
    const END_HOUR = 18;
    const SLOT_INTERVAL = 30;

    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + SLOT_INTERVAL <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        slots.push({ formatted: `${displayHour.toString().padStart(2, '0')}:${displayMinute} ${ampm}`, rawValue: `${hour.toString().padStart(2, '0')}:${displayMinute}` });
        currentMinutes += SLOT_INTERVAL;
      }
      return slots;
    };

    const getSpanishDayName = (date) => { const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb']; return days[date.getDay()]; };
    const getSpanishMonthName = (date) => { const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic']; return months[date.getMonth()]; };

    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        days.push({
          isoString: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`,
          dayName: getSpanishDayName(date), dayNumber: date.getDate(), monthName: getSpanishMonthName(date)
        });
      }
      return days;
    };

    function App() {
      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(START_HOUR, END_HOUR), []);

      const [selectedDate, setSelectedDate] = useState(daysList[0].isoString);
      const [selectedTime, setSelectedTime] = useState('');
      const [clientName, setClientName] = useState('');
      const [clientPhone, setClientPhone] = useState('');
      const [bookingSuccess, setBookingSuccess] = useState(false);
      
      const [bookedAppointments, setBookedAppointments] = useState([]);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        async function fetchOcupados() {
          setLoading(true);
          const { data, error } = await supabase
            .from('citas')
            .select('hora_turno')
            .eq('fecha_turno', selectedDate);
          
          if (!error && data) {
            setBookedAppointments(data.map(c => c.hora_turno));
          }
          setLoading(false);
        }
        fetchOcupados();
      }, [selectedDate]);

      const handleConfirmBooking = async (e) => {
        e.preventDefault();
        if (!selectedTime || !clientName.trim() || !clientPhone.trim()) return;

        // Intentar obtener la primera barbería de la base de datos de manera dinámica si existe
        let targetId = DEPLOYED_BARBERIA_ID;
        const { data: barb } = await supabase.from('perfil_barberia').select('id').limit(1);
        if (barb && barb.length > 0) {
          targetId = barb[0].id;
        }

        const { error } = await supabase
          .from('citas')
          .insert([{
            barberia_id: targetId,
            nombre_cliente: clientName.trim(),
            celular_cliente: clientPhone.trim(),
            fecha_turno: selectedDate,
            hora_turno: selectedTime,
            estado: 'pending'
          }]);

        if (error) {
          alert("Hubo un problema al guardar tu turno: " + error.message);
        } else {
          setBookingSuccess(true);
        }
      };

      const selectedDayDetails = daysList.find(d => d.isoString === selectedDate);

      return (
        <div className="max-w-md mx-auto w-full px-4 py-6 flex flex-col min-h-screen justify-between">
          <header className="text-center py-4 space-y-1">
            <span className="text-[10px] uppercase font-bold tracking-widest text-purple-400 bg-purple-950/40 border border-purple-900/30 px-3 py-1 rounded-full">Reserva en Línea</span>
            <h1 className="text-2xl font-black text-white tracking-tight mt-2">💈 Barbería Agenda Real</h1>
            <p className="text-xs text-slate-400">Separa tu espacio de forma inmediata.</p>
          </header>

          {bookingSuccess ? (
            <div className="my-auto py-8 px-6 bg-slate-900/40 border border-slate-900 rounded-3xl text-center space-y-6">
              <div className="h-16 w-16 bg-emerald-500/10 border border-emerald-500/30 rounded-full flex items-center justify-center mx-auto">
                <svg className="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" /></svg>
              </div>
              <div className="space-y-2">
                <h2 className="text-xl font-bold text-white">¡Turno Reservado con éxito!</h2>
                <p className="text-xs text-slate-400">Guardado de forma segura en el sistema.</p>
              </div>
              <div className="bg-slate-950 border border-slate-850 p-4 rounded-2xl text-left space-y-2 text-xs">
                <p className="text-slate-400"><strong className="text-slate-200">Fecha:</strong> {selectedDayDetails?.dayName} {selectedDayDetails?.dayNumber}</p>
                <p className="text-slate-400"><strong className="text-slate-200">Hora:</strong> {selectedTime}</p>
                <p className="text-slate-400"><strong className="text-slate-200">Cliente:</strong> {clientName}</p>
              </div>
              <button onClick={() => { setBookingSuccess(false); setClientName(''); setClientPhone(''); setSelectedTime(''); }} className="w-full py-3.5 bg-slate-900 text-slate-300 font-bold rounded-xl text-xs transition-all">Reservar otro turno</button>
            </div>
          ) : (
            <div className="space-y-6 my-auto">
              <div className="space-y-2">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">1. Selecciona el Día</label>
                <div className="flex space-x-2 overflow-x-auto pb-1 custom-scrollbar">
                  {daysList.map((d) => {
                    const isSelected = selectedDate === d.isoString;
                    return (
                      <button key={d.isoString} type="button" onClick={() => { setSelectedDate(d.isoString); setSelectedTime(''); }} className={`px-4 py-3 rounded-2xl border flex flex-col items-center shrink-0 min-w-[65px] transition-all ${isSelected ? 'bg-purple-600 border-purple-500 text-white' : 'bg-slate-900/40 border-slate-900 text-slate-400'}`}>
                        <span className="text-[9px] uppercase font-bold tracking-tight opacity-70">{d.dayName}</span>
                        <span className="text-base font-extrabold mt-0.5">{d.dayNumber}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="space-y-2">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">2. Selecciona la Hora</label>
                {loading ? (
                  <div className="text-center py-6 text-xs text-slate-500">Sincronizando horarios libres...</div>
                ) : (
                  <div className="grid grid-cols-3 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-2 bg-slate-900/20 border border-slate-900 rounded-2xl">
                    {timeSlots.map((slot) => {
                      const isBooked = bookedAppointments.includes(slot.formatted);
                      const isSelected = selectedTime === slot.formatted;
                      if (isBooked) return <div key={slot.rawValue} className="py-3 border border-slate-950 bg-slate-950/40 text-slate-700 text-xs text-center line-through rounded-xl select-none">Ocupado</div>;
                      return <button key={slot.rawValue} type="button" onClick={() => setSelectedTime(slot.formatted)} className={`py-3 border text-xs font-bold text-center rounded-xl transition-all ${isSelected ? 'bg-purple-600/20 border-purple-500 text-purple-300' : 'bg-slate-950 border-slate-850 text-slate-300'}`}>{slot.formatted}</button>;
                    })}
                  </div>
                )}
              </div>

              <form onSubmit={handleConfirmBooking} className="space-y-4 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block -mb-2">3. Tus Datos</label>
                <div className="space-y-3 pt-2">
                  <input type="text" required placeholder="Tu nombre completo" value={clientName} onChange={(e) => setClientName(e.target.value)} className="w-full px-4 py-3 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-xs outline-none text-slate-200" />
                  <input type="tel" required placeholder="Tu número de celular" value={clientPhone} onChange={(e) => setClientPhone(e.target.value)} className="w-full px-4 py-3 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-xs outline-none text-slate-200" />
                </div>
                <button type="submit" disabled={!selectedTime || !clientName.trim() || !clientPhone.trim()} className="w-full py-4 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl text-xs shadow-lg disabled:opacity-50">
                  {selectedTime ? `Confirmar Turno para las ${selectedTime}` : 'Selecciona una hora para continuar'}
                </button>
              </form>
            </div>
          )}

          <footer className="py-4 text-center text-[9px] text-slate-600 border-t border-slate-900 mt-auto"><p>ZapiCitas Agendamiento © 2026</p></footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
