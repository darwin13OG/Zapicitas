<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reserva | ZapiCitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
  <div id="app" class="max-w-md mx-auto px-6 py-10 space-y-8" v-cloak>
    
    <header class="text-center space-y-4">
      <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none text-white">{{ bizName }}</h1>
      <div v-if="pausado" class="mt-4 p-6 bg-rose-500/10 border border-rose-500/20 rounded-[2rem]">
        <p class="text-rose-400 font-bold text-xs uppercase tracking-widest italic">Cerrado temporalmente</p>
      </div>
    </header>

    <!-- NAVEGACIÓN -->
    <div class="flex bg-slate-900/50 p-1.5 rounded-2xl border border-slate-800">
      <button @click="tab = 'reserva'" :class="tab === 'reserva' ? 'bg-purple-600 text-white' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-black uppercase italic text-[10px] tracking-widest transition-all">Reservar</button>
      <button @click="tab = 'consulta'" :class="tab === 'consulta' ? 'bg-purple-600 text-white' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-black uppercase italic text-[10px] tracking-widest transition-all">Mi Cita</button>
    </div>

    <!-- PESTAÑA: AGENDAR -->
    <div v-if="tab === 'reserva' && !pausado" class="space-y-6 animate-in fade-in duration-500">
      <div class="space-y-2">
        <label class="text-[9px] font-black italic text-slate-500 uppercase tracking-widest px-1">1. Elige el Día</label>
        <input v-model="form.date" type="date" @change="fetchOcupados" :min="minDate" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
      </div>

      <div v-if="form.date" class="space-y-3">
        <label class="text-[9px] font-black italic text-slate-500 uppercase tracking-widest px-1">2. ¿A qué hora?</label>
        <div class="grid grid-cols-3 gap-2">
          <button type="button" v-for="h in availableSlots" :key="h" @click="form.time = h" 
            :class="form.time === h ? 'bg-purple-600 border-purple-500 text-white scale-95' : 'bg-slate-900 border-slate-800 text-slate-400'"
            class="py-3 border rounded-xl text-[10px] font-black italic transition-all">
            {{ h }}
          </button>
        </div>
      </div>

      <div v-if="form.time" class="space-y-3 pt-4 border-t border-slate-900 animate-in zoom-in duration-500">
        <input v-model="form.cli" type="text" placeholder="Tu nombre" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        <input v-model="form.tel" type="tel" placeholder="Tu celular" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        <button @click="save" class="w-full py-5 bg-purple-600 rounded-3xl font-black italic text-sm tracking-widest uppercase shadow-xl shadow-purple-600/30">Agendar Turno</button>
      </div>
    </div>

    <!-- PESTAÑA: CONSULTA -->
    <div v-if="tab === 'consulta'" class="space-y-6">
      <div class="flex gap-2">
        <input v-model="searchTel" type="tel" placeholder="Celular" class="flex-1 p-4 bg-slate-900 border border-slate-800 rounded-2xl text-white outline-none">
        <button @click="consultar" class="bg-purple-600 px-6 rounded-2xl font-bold">🔍</button>
      </div>
      <div v-for="c in misCitas" :key="c.id" class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-4 shadow-xl">
        <div class="flex justify-between items-start">
          <p class="font-black italic text-white uppercase">{{ c.hora_turno }}<br><span class="text-[9px] text-slate-500">{{ c.fecha_turno }}</span></p>
          <span :class="c.estado === 'paid' ? 'text-emerald-400' : 'text-amber-400'" class="text-[9px] font-black uppercase italic tracking-widest">{{ c.estado === 'paid' ? 'Confirmado' : 'Pendiente' }}</span>
        </div>
        <button @click="cancelar(c.id)" class="w-full py-3 bg-slate-950 text-rose-500 rounded-xl text-[10px] font-black italic border border-rose-900/20 uppercase">Cancelar Turno</button>
      </div>
    </div>

    <!-- MODAL DE ÉXITO PREMIUM -->
    <div v-if="successModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-6 z-50">
      <div class="bg-slate-900 border border-purple-500/30 p-10 rounded-[3rem] text-center space-y-6 shadow-2xl max-w-xs w-full animate-in zoom-in duration-300">
        <div class="w-20 h-20 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner">✓</div>
        <div class="space-y-2">
          <h2 class="text-2xl font-black italic uppercase tracking-tighter text-white">¡Turno Agendado!</h2>
          <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest leading-relaxed">Tu lugar ha sido reservado con éxito en {{ bizName }}.</p>
        </div>
        <button @click="successModal = false; location.reload()" class="w-full py-4 bg-purple-600 rounded-2xl font-black italic uppercase text-xs tracking-[0.2em] shadow-lg">Excelente</button>
      </div>
    </div>

  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;
    const sb = supabase.createClient("https://tsasorwwbbscnbvoyyhf.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8");

    createApp({
      setup() {
        const tab = ref('reserva');
        const bizId = ref('');
        const bizName = ref('Cargando...');
        const pausado = ref(false);
        const successModal = ref(false);
        const bizConfig = ref({ inicio: '08:00', fin: '18:00', duracion: 60 });
        const occupiedSlots = ref([]);
        const minDate = new Date().toISOString().split('T')[0];
        const form = ref({ date: '', time: '', cli: '', tel: '' });
        const searchTel = ref('');
        const misCitas = ref([]);

        const availableSlots = computed(() => {
          const slots = [];
          let current = new Date(`2024-01-01T${bizConfig.value.inicio}`);
          const end = new Date(`2024-01-01T${bizConfig.value.fin}`);
          while(current < end) {
            const timeStr = current.toTimeString().slice(0, 5);
            if(!occupiedSlots.value.includes(timeStr)) slots.push(timeStr);
            current.setMinutes(current.getMinutes() + bizConfig.value.duracion);
          }
          return slots;
        });

        onMounted(async () => {
          const id = new URLSearchParams(window.location.search).get('id');
          if (id) {
            bizId.value = id;
            const { data } = await sb.from('perfil_barberia').select('*').eq('id', id).single();
            if(data) {
              bizName.value = data.nombre_negocio;
              pausado.value = data.esta_pausado;
              bizConfig.value = { inicio: data.hora_inicio, fin: data.hora_fin, duracion: data.duracion_minutos };
            }
          }
        });

        const fetchOcupados = async () => {
          if(!form.value.date) return;
          const { data } = await sb.from('citas').select('hora_turno').eq('barberia_id', bizId.value).eq('fecha_turno', form.value.date);
          occupiedSlots.value = data ? data.map(d => d.hora_turno.slice(0, 5)) : [];
        };

        const save = async () => {
          const { error } = await sb.from('citas').insert([{ barberia_id: bizId.value, nombre_cliente: form.value.cli, celular_cliente: form.value.tel, fecha_turno: form.value.date, hora_turno: form.value.time, estado: 'pending' }]);
          if(!error) successModal.value = true;
        };

        const consultar = async () => {
          const { data } = await sb.from('citas').select('*').eq('barberia_id', bizId.value).eq('celular_cliente', searchTel.value);
          misCitas.value = data || [];
        };

        const cancelar = async (id) => {
          if(confirm('¿Deseas cancelar?')) {
            await sb.from('citas').delete().eq('id', id);
            consultar();
          }
        };

        return { tab, bizName, pausado, form, successModal, minDate, availableSlots, searchTel, misCitas, fetchOcupados, save, consultar, cancelar };
      }
    }).mount('#app');
  </script>
</body>
</html>
