<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Reserva tu Turno</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(147, 51, 234, 0.3); border-radius: 2px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const START_HOUR = 8;
    const END_HOUR = 18;
    const SLOT_INTERVAL = 30;

    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + SLOT_INTERVAL <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        slots.push({ formatted: `${displayHour.toString().padStart(2, '0')}:${displayMinute} ${ampm}`, rawValue: `${hour.toString().padStart(2, '0')}:${displayMinute}` });
        currentMinutes += SLOT_INTERVAL;
      }
      return slots;
    };

    const getSpanishDayName = (date) => ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][date.getDay()];
    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        days.push({
          isoString: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`,
          dayName: getSpanishDayName(date), dayNumber: date.getDate()
        });
      }
      return days;
    };

    function App() {
      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(START_HOUR, END_HOUR), []);

      const [targetBarberiaId, setTargetBarberiaId] = useState('');
      const [barberiaName, setBarberiaName] = useState('Barbería');
      const [selectedDate, setSelectedDate] = useState(daysList[0].isoString);
      const [selectedTime, setSelectedTime] = useState('');
      const [clientName, setClientName] = useState('');
      const [clientPhone, setClientPhone] = useState('');
      const [bookingSuccess, setBookingSuccess] = useState(false);
      const [bookedAppointments, setBookedAppointments] = useState([]);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id');
        if (idParam) {
          setTargetBarberiaId(idParam);
          supabase.from('perfil_barberia').select('nombre_negocio').eq('id', idParam).single()
            .then(({ data }) => data && setBarberiaName(data.nombre_negocio));
        }
      }, []);

      useEffect(() => {
        if (!targetBarberiaId) return;
        setLoading(true);
        supabase.from('citas').select('hora_turno').eq('barberia_id', targetBarberiaId).eq('fecha_turno', selectedDate)
          .then(({ data }) => {
            if (data) setBookedAppointments(data.map(c => c.hora_turno));
            setLoading(false);
          });
      }, [selectedDate, targetBarberiaId]);

      const handleConfirmBooking = async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('citas').insert([{ barberia_id: targetBarberiaId, nombre_cliente: clientName, celular_cliente: clientPhone, fecha_turno: selectedDate, hora_turno: selectedTime, estado: 'pending' }]);
        if (error) alert("Error: " + error.message);
        else setBookingSuccess(true);
      };

      return (
        <div className="max-w-md mx-auto w-full px-4 py-6 flex flex-col min-h-screen">
          <header className="text-center py-4">
            <h1 className="text-2xl font-black text-white">💈 {barberiaName}</h1>
            <p className="text-xs text-slate-400">Reserva tu turno en línea</p>
          </header>

          {bookingSuccess ? (
            <div className="my-auto p-6 bg-slate-900/40 border border-slate-900 rounded-3xl text-center space-y-4">
              <h2 className="text-xl font-bold text-emerald-400">¡Reservado!</h2>
              <p className="text-xs text-slate-400">Te esperamos el {selectedDate} a las {selectedTime}</p>
              <button onClick={() => setBookingSuccess(false)} className="w-full py-3 bg-purple-600 font-bold rounded-xl text-xs">Aceptar</button>
            </div>
          ) : (
            <div className="space-y-6 my-auto">
              <div>
                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-2">1. Selecciona el Día</label>
                <div className="flex space-x-2 overflow-x-auto pb-1 custom-scrollbar">
                  {daysList.map((d) => (
                    <button key={d.isoString} onClick={() => setSelectedDate(d.isoString)} className={`px-4 py-2 rounded-2xl border shrink-0 min-w-[60px] ${selectedDate === d.isoString ? 'bg-purple-600 border-purple-500 text-white' : 'bg-slate-900 border-slate-900 text-slate-400'}`}>
                      <span className="text-[8px] uppercase block">{d.dayName}</span>
                      <span className="text-sm font-bold">{d.dayNumber}</span>
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-2">2. Selecciona la Hora</label>
                <div className="grid grid-cols-3 gap-2 p-2 bg-slate-900/20 border border-slate-900 rounded-2xl max-h-[150px] overflow-y-auto custom-scrollbar">
                  {timeSlots.map((slot) => {
                    const isBooked = bookedAppointments.includes(slot.formatted);
                    if (isBooked) return <div key={slot.rawValue} className="py-2 text-slate-700 text-[10px] text-center line-through">Ocupado</div>;
                    return <button key={slot.rawValue} onClick={() => setSelectedTime(slot.formatted)} className={`py-2 text-[10px] font-bold text-center rounded-xl border ${selectedTime === slot.formatted ? 'bg-purple-600 border-purple-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-300'}`}>{slot.formatted}</button>;
                  })}
                </div>
              </div>

              <form onSubmit={handleConfirmBooking} className="space-y-3 bg-slate-900/40 p-4 rounded-2xl border border-slate-900">
                <input type="text" required placeholder="Tu nombre" value={clientName} onChange={(e) => setClientName(e.target.value)} className="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white" />
                <input type="tel" required placeholder="Tu celular" value={clientPhone} onChange={(e) => setClientPhone(e.target.value)} className="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white" />
                <button type="submit" disabled={!selectedTime} className="w-full py-3 bg-purple-600 font-bold rounded-xl text-xs disabled:opacity-40">Agendar Turno</button>
              </form>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
