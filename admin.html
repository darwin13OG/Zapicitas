<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Panel Admin</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      const [auth, setAuth] = useState(false);
      const [isReg, setIsReg] = useState(new URLSearchParams(window.location.search).has('id'));
      const [id, setId] = useState(null);
      const [name, setName] = useState('');
      const [tel, setTel] = useState('');
      const [pass, setPass] = useState('');
      const [citas, setCitas] = useState([]);

      const loadCitas = async (bId) => {
        const { data } = await supabase.from('citas').select('*').eq('barberia_id', bId);
        if(data) setCitas(data);
      };

      const handleEnter = async (e) => {
        e.preventDefault();
        if(isReg) {
          const { data } = await supabase.from('perfil_barberia').insert([{ nombre_negocio: name, celular: tel, clave_acceso: pass }]).select().single();
          if(data) { setId(data.id); setName(data.nombre_negocio); setAuth(true); loadCitas(data.id); }
          else alert('Error al registrar');
        } else {
          const { data } = await supabase.from('perfil_barberia').select('*').eq('celular', tel).single();
          if(data && data.clave_acceso === pass) { setId(data.id); setName(data.nombre_negocio); setAuth(true); loadCitas(data.id); }
          else alert('Credenciales incorrectas');
        }
      };

      if (!auth) return (
        <div className="max-w-md mx-auto py-20 px-6">
          <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 space-y-6">
            <h1 className="text-2xl font-bold text-center">{isReg ? "📝 Nuevo Registro" : "Acceso Admin"}</h1>
            <form onSubmit={handleEnter} className="space-y-4">
              {isReg && <input type="text" placeholder="Nombre de Barbería" required onChange={e=>setName(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none" />}
              <input type="tel" placeholder="Celular" required onChange={e=>setTel(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none" />
              <input type="password" placeholder="Contraseña" required onChange={e=>setPass(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none" />
              <button className="w-full py-4 bg-purple-600 rounded-xl font-bold shadow-lg shadow-purple-600/20">{isReg ? "Finalizar" : "Entrar"}</button>
            </form>
            <button onClick={()=>setIsReg(!isReg)} className="w-full text-xs text-purple-400">{isReg ? "Ya tengo cuenta" : "¿Acabas de pagar? Regístrate aquí"}</button>
          </div>
        </div>
      );

      return (
        <div className="max-w-md mx-auto p-4 space-y-6">
          <header className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
            <h2 className="font-bold">💈 {name}</h2>
            <button onClick={()=>location.reload()} className="text-[10px] bg-slate-800 px-3 py-1 rounded-lg">Salir</button>
          </header>

          <div className="bg-purple-900/20 p-5 rounded-3xl border border-purple-500/20 text-center space-y-3">
            <span className="text-[10px] font-bold text-purple-300 uppercase">Link de Clientes</span>
            <div className="bg-slate-950 p-2 rounded text-[10px] truncate text-slate-500">
              {`${window.location.origin}/reserva?id=${id}`}
            </div>
            <button onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}/reserva?id=${id}`); alert('Link copiado')}} className="w-full py-2 bg-purple-600 rounded-xl text-xs font-bold">COPIAR LINK</button>
          </div>

          <div className="space-y-3">
            <h3 className="text-xs font-bold text-slate-400 px-1 uppercase">Citas Activas</h3>
            {citas.map(c => (
              <div key={c.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                <div>
                  <p className="text-sm font-bold">{c.nombre_cliente}</p>
                  <p className="text-[10px] text-purple-400 font-bold">{c.fecha_turno} | {c.hora_turno}</p>
                </div>
                <button onClick={async ()=>{await supabase.from('citas').delete().eq('id',c.id); loadCitas(id)}} className="text-slate-600">✕</button>
              </div>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
