<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Panel de Administración</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + 30 <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        slots.push({ formatted: `${displayHour}:${displayMinute} ${ampm}` });
        currentMinutes += 30;
      }
      return slots;
    };

    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        days.push({
          isoString: date.toISOString().split('T')[0],
          dayName: ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][date.getDay()],
          dayNumber: date.getDate()
        });
      }
      return days;
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [isRegisterMode, setIsRegisterMode] = useState(() => {
        const params = new URLSearchParams(window.location.search);
        return params.get('mode') === 'register' || params.has('id');
      });

      const [barberiaId, setBarberiaId] = useState(null); 
      const [barberiaName, setBarberiaName] = useState('');
      const [celular, setCelular] = useState('');
      const [password, setPassword] = useState('');
      const [appointments, setAppointments] = useState([]);
      const [copied, setCopied] = useState(false);

      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(8, 18), []);

      const fetchCitas = async (id) => {
        const { data } = await supabase.from('citas').select('*').eq('barberia_id', id);
        if (data) setAppointments(data);
      };

      useEffect(() => {
        if (isAuthenticated && barberiaId) {
          fetchCitas(barberiaId);
          const channel = supabase.channel('citas-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'citas' }, () => fetchCitas(barberiaId)).subscribe();
          return () => supabase.removeChannel(channel);
        }
      }, [isAuthenticated, barberiaId]);

      const handleAuth = async (e) => {
        e.preventDefault();
        const { data: existente } = await supabase.from('perfil_barberia').select('*').eq('celular', celular.trim()).single();

        if (isRegisterMode) {
          if (existente) return alert('Este celular ya existe.');
          const { data: nuevo } = await supabase.from('perfil_barberia').insert([{ nombre_negocio: barberiaName.trim(), celular: celular.trim(), clave_acceso: password.trim() }]).select().single();
          if (nuevo) { setBarberiaId(nuevo.id); setBarberiaName(nuevo.nombre_negocio); setIsAuthenticated(true); }
        } else {
          if (existente && existente.clave_acceso === password.trim()) {
            setBarberiaId(existente.id); setBarberiaName(existente.nombre_negocio); setIsAuthenticated(true);
          } else { alert('Datos incorrectos.'); }
        }
      };

      const customLink = `${window.location.origin}/reserva?id=${barberiaId}`;

      if (!isAuthenticated) {
        return (
          <div className="max-w-md mx-auto px-6 py-20">
            <div className="bg-slate-900/50 p-8 rounded-3xl border border-slate-800 space-y-6">
              <h1 className="text-2xl font-bold text-center">{isRegisterMode ? "📝 Crear Barbería" : "Panel de Acceso"}</h1>
              <form onSubmit={handleAuth} className="space-y-4">
                {isRegisterMode && <input type="text" placeholder="Nombre de Barbería" required value={barberiaName} onChange={e => setBarberiaName(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none" />}
                <input type="tel" placeholder="Celular" required value={celular} onChange={e => setCelular(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none" />
                <input type="password" placeholder="Contraseña" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none" />
                <button type="submit" className="w-full py-4 bg-purple-600 rounded-xl font-bold">{isRegisterMode ? "Finalizar Registro" : "Entrar"}</button>
              </form>
              <button onClick={() => setIsRegisterMode(!isRegisterMode)} className="w-full text-xs text-purple-400 underline">
                {isRegisterMode ? "Ya tengo cuenta" : "¿Acabas de pagar? Regístrate aquí"}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-md mx-auto px-4 py-8 space-y-6">
          <div className="bg-purple-900/20 p-4 rounded-2xl border border-purple-500/30 text-center space-y-2">
            <span className="text-[10px] font-bold uppercase text-purple-300">Tu Enlace de Reservas:</span>
            <p className="text-[10px] bg-slate-950 p-2 rounded border border-slate-800 truncate">{customLink}</p>
            <button onClick={() => { navigator.clipboard.writeText(customLink); setCopied(true); setTimeout(() => setCopied(false), 2000); }} className="w-full py-2 bg-purple-600 rounded-lg text-xs font-bold">
              {copied ? "¡Copiado!" : "Copiar Link"}
            </button>
          </div>

          <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
            <h2 className="text-xl font-bold">💈 {barberiaName}</h2>
            <p className="text-xs text-slate-500">Panel de Control Activo</p>
          </div>

          <div className="space-y-3">
            <h3 className="text-sm font-bold text-slate-400 uppercase">Citas Recientes</h3>
            {appointments.length === 0 ? <p className="text-xs text-slate-600">No hay citas aún.</p> : (
              appointments.map(app => (
                <div key={app.id} className="p-4 bg-slate-900 border border-slate-800 rounded-xl flex justify-between items-center">
                  <div>
                    <p className="text-sm font-bold">{app.nombre_cliente}</p>
                    <p className="text-[10px] text-slate-400">{app.fecha_turno} a las {app.hora_turno}</p>
                  </div>
                  <button onClick={async () => { if(confirm('¿Eliminar?')) { await supabase.from('citas').delete().eq('id', app.id); fetchCitas(barberiaId); } }} className="text-slate-500">✕</button>
                </div>
              ))
            )}
          </div>
          
          <button onClick={() => location.reload()} className="w-full py-3 bg-slate-900 rounded-xl text-xs text-slate-500">Cerrar Sesión</button>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
