<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Panel de Administración</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(147, 51, 234, 0.3); border-radius: 2px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // Tus Credenciales Reales de Supabase
    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const START_HOUR = 8;
    const END_HOUR = 18;
    const SLOT_INTERVAL = 30;

    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + SLOT_INTERVAL <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        slots.push({ formatted: `${displayHour.toString().padStart(2, '0')}:${displayMinute} ${ampm}`, rawValue: `${hour.toString().padStart(2, '0')}:${displayMinute}` });
        currentMinutes += SLOT_INTERVAL;
      }
      return slots;
    };

    const getSpanishDayName = (date) => { const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb']; return days[date.getDay()]; };
    const getSpanishMonthName = (date) => { const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic']; return months[date.getMonth()]; };
    
    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        days.push({
          isoString: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`,
          dayName: getSpanishDayName(date), dayNumber: date.getDate(), monthName: getSpanishMonthName(date)
        });
      }
      return days;
    };

    const formatCurrency = (val) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val || 0);

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [barberiaId, setBarberiaId] = useState(null); 
      const [barberiaName, setBarberiaName] = useState('');
      const [celular, setCelular] = useState('');
      const [password, setPassword] = useState('');

      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(START_HOUR, END_HOUR), []);
      const [appointments, setAppointments] = useState([]); // Totalmente vacío para arrancar limpio

      const [salesModuleActive, setSalesModuleActive] = useState(true);
      const [adminFilterDate, setAdminFilterDate] = useState(daysList[0].isoString);
      const [adminViewType, setAdminViewType] = useState('day');
      const [showManualForm, setShowManualForm] = useState(false);

      const [manualName, setManualName] = useState('');
      const [manualPhone, setManualPhone] = useState('');
      const [manualDate, setManualDate] = useState(daysList[0].isoString);
      const [manualTime, setManualTime] = useState('');

      const [checkoutId, setCheckoutId] = useState(null);
      const [chargeInput, setChargeInput] = useState('');

      const fetchCitasDesdeServidor = async (idActual) => {
        if (!idActual) return;
        const { data, error } = await supabase
          .from('citas')
          .select('*')
          .eq('barberia_id', idActual);
        if (!error && data) {
          setAppointments(data);
        }
      };

      // CORRECCIÓN DE TIEMPO REAL REALIZADA AQUÍ (schema en vez de pattern)
      useEffect(() => {
        if (isAuthenticated && barberiaId) {
          fetchCitasDesdeServidor(barberiaId);

          const channel = supabase
            .channel('cambios-citas')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'citas', filter: `barberia_id=eq.${barberiaId}` }, () => {
              fetchCitasDesdeServidor(barberiaId);
            })
            .subscribe();

          return () => { supabase.removeChannel(channel); };
        }
      }, [isAuthenticated, barberiaId]);

      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        if (!barberiaName.trim() || !celular.trim() || !password.trim()) return;

        try {
          const { data: existente, error: errBuscar } = await supabase
            .from('perfil_barberia')
            .select('*')
            .eq('celular', celular.trim());

          if (existente && existente.length > 0) {
            const negocio = existente[0];
            if (negocio.clave_acceso === password.trim()) {
              setBarberiaId(negocio.id);
              setBarberiaName(negocio.nombre_negocio);
              setIsAuthenticated(true);
            } else {
              alert('Contraseña incorrecta para este negocio.');
            }
          } else {
            const { data: nuevo, error: errInsert } = await supabase
              .from('perfil_barberia')
              .insert([{ nombre_negocio: barberiaName.trim(), celular: celular.trim(), clave_acceso: password.trim() }])
              .select();

            if (!errInsert && nuevo && nuevo.length > 0) {
              alert('¡Tu negocio ha sido registrado con éxito en ZapiCitas!');
              setBarberiaId(nuevo[0].id);
              setBarberiaName(nuevo[0].nombre_negocio);
              setIsAuthenticated(true);
            } else {
              alert('Error al registrar: ' + errInsert?.message);
            }
          }
        } catch (err) {
          alert("Error de conexión: " + err.message);
        }
      };

      const dailyEarnings = useMemo(() => {
        return appointments
          .filter(app => app.fecha_turno === adminFilterDate && app.estado === 'paid')
          .reduce((sum, app) => sum + Number(app.valor_cobrado || 0), 0);
      }, [appointments, adminFilterDate]);

      const monthlyEarnings = useMemo(() => {
        const monthPrefix = adminFilterDate.slice(0, 7);
        return appointments
          .filter(app => app.fecha_turno.startsWith(monthPrefix) && app.estado === 'paid')
          .reduce((sum, app) => sum + Number(app.valor_cobrado || 0), 0);
      }, [appointments, adminFilterDate]);

      const filteredAppointments = useMemo(() => {
        let list = appointments;
        if (adminViewType === 'day') {
          list = appointments.filter(app => app.fecha_turno === adminFilterDate);
        }
        return [...list].sort((a, b) => a.fecha_turno.localeCompare(b.fecha_turno) || a.hora_turno.localeCompare(b.hora_turno));
      }, [appointments, adminFilterDate, adminViewType]);

      const handleManualSubmit = async (e) => {
        e.preventDefault();
        if (!manualName.trim() || !manualPhone.trim() || !manualTime || !barberiaId) return;

        await supabase
          .from('citas')
          .insert([{ barberia_id: barberiaId, nombre_cliente: manualName.trim(), celular_cliente: manualPhone.trim(), fecha_turno: manualDate, hora_turno: manualTime, estado: 'pending' }]);
        
          setManualName(''); setManualPhone(''); setManualTime(''); setShowManualForm(false);
        fetchCitasDesdeServidor(barberiaId);
      };

      const handleCancelCita = async (id) => {
        if (window.confirm('¿Deseas eliminar esta cita de la agenda?')) {
          await supabase.from('citas').delete().eq('id', id);
          fetchCitasDesdeServidor(barberiaId);
        }
      };

      const handleChargeConfirm = async (e) => {
        e.preventDefault();
        if (!chargeInput || !checkoutId) return;

        await supabase
          .from('citas')
          .update({ valor_cobrado: Number(chargeInput), estado: 'paid' })
          .eq('id', checkoutId);

        setCheckoutId(null); setChargeInput('');
        fetchCitasDesdeServidor(barberiaId);
      };

      return (
        <div className="max-w-md mx-auto w-full px-4 py-6 flex flex-col min-h-screen justify-between">
          {!isAuthenticated ? (
            <div className="my-auto py-8 px-6 bg-slate-900/40 border border-slate-900 rounded-3xl space-y-6">
              <div className="text-center space-y-2">
                <h1 className="text-2xl font-extrabold text-white tracking-tight">Acceso Administrador</h1>
                <p className="text-xs text-slate-400">Registra tu barbería o inicia sesión de manera segura.</p>
              </div>
              <form onSubmit={handleLoginSubmit} className="space-y-4">
                <div className="flex flex-col gap-1.5">
                  <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Nombre de la Barbería</label>
                  <input type="text" required placeholder="Ej. Barbería Royal" value={barberiaName} onChange={(e) => setBarberiaName(e.target.value)} className="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-sm outline-none text-slate-100" />
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Celular del Negocio</label>
                  <input type="tel" required placeholder="Ej. 3124567890" value={celular} onChange={(e) => setCelular(e.target.value)} className="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-sm outline-none text-slate-100" />
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Contraseña de Entrada</label>
                  <input type="password" required placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-sm outline-none text-slate-100 text-center tracking-widest" />
                </div>
                <button type="submit" className="w-full py-4 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-2xl text-sm shadow-lg transition-all">Ingresar al Panel</button>
              </form>
            </div>
          ) : (
            <div className="space-y-6">
              <div className="flex items-center justify-between bg-slate-900/40 border border-slate-900 p-4 rounded-2xl">
                <div>
                  <h2 className="text-base font-bold text-white truncate max-w-[180px]">💈 {barberiaName}</h2>
                  <span className="text-[10px] text-purple-400 font-medium">Panel Conectado</span>
                </div>
                <div className="flex items-center gap-2 bg-slate-950 px-2.5 py-1.5 rounded-xl border border-slate-850">
                  <span className="text-[8px] text-slate-400 font-bold uppercase tracking-wider">Caja</span>
                  <button onClick={() => setSalesModuleActive(!salesModuleActive)} className={`w-8 h-5 rounded-full p-0.5 transition-all flex items-center ${salesModuleActive ? 'bg-purple-600 justify-end' : 'bg-slate-800 justify-start'}`} >
                    <span className="w-4 h-4 rounded-full bg-white block"></span>
                  </button>
                </div>
              </div>

              {salesModuleActive && (
                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-4">
                    <span className="text-[9px] text-slate-500 font-bold uppercase tracking-wider block">Caja de Hoy</span>
                    <span className="text-base font-extrabold text-white block mt-1">{formatCurrency(dailyEarnings)}</span>
                  </div>
                  <div className="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-4">
                    <span className="text-[9px] text-slate-500 font-bold uppercase tracking-wider block">Caja Mensual</span>
                    <span className="text-base font-extrabold text-emerald-400 block mt-1">{formatCurrency(monthlyEarnings)}</span>
                  </div>
                </div>
              )}

              <div className="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 space-y-3">
                <button onClick={() => setShowManualForm(!showManualForm)} className="w-full flex items-center justify-between text-xs font-bold text-slate-300">
                  <span className="flex items-center gap-2"><span className="h-2 w-2 rounded-full bg-purple-500 animate-pulse"></span>Agendar Cita Manual</span>
                  <span className="text-lg text-purple-400">{showManualForm ? '−' : '＋'}</span>
                </button>
                {showManualForm && (
                  <form onSubmit={handleManualSubmit} className="space-y-4 pt-3 border-t border-slate-850/60">
                    <input type="text" required placeholder="Nombre" value={manualName} onChange={(e) => setManualName(e.target.value)} className="w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-200" />
                    <input type="tel" required placeholder="Celular" value={manualPhone} onChange={(e) => setManualPhone(e.target.value)} className="w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-200" />
                    <select value={manualDate} onChange={(e) => { setManualDate(e.target.value); setManualTime(''); }} className="w-full px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-400 outline-none">
                      {daysList.map(d => <option key={d.isoString} value={d.isoString}>{d.dayName} {d.dayNumber}</option>)}
                    </select>
                    <div className="grid grid-cols-3 gap-1 max-h-[120px] overflow-y-auto custom-scrollbar p-1 bg-slate-950 rounded-xl border border-slate-850">
                      {timeSlots.map(slot => {
                        const isBooked = appointments.some(app => app.fecha_turno === manualDate && app.hora_turno === slot.formatted);
                        const isSelected = manualTime === slot.formatted;
                        if (isBooked) return <div key={slot.rawValue} className="p-2 text-slate-700 text-[9px] text-center line-through select-none">Ocupado</div>;
                        return <button key={slot.rawValue} type="button" onClick={() => setManualTime(slot.formatted)} className={`p-2 border rounded-lg text-[9px] font-bold text-center ${isSelected ? 'bg-purple-600/20 border-purple-500 text-purple-300' : 'bg-slate-950 border-slate-850 text-slate-400'}`}>{slot.formatted}</button>;
                      })}
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-purple-600 text-white text-xs font-bold rounded-xl">Guardar Turno</button>
                  </form>
                )}
              </div>

              <div className="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 space-y-4">
                <div className="flex items-center justify-between">
                  <span className="text-xs font-bold text-slate-300">Agenda Activa</span>
                  <div className="flex bg-slate-950 p-0.5 rounded-lg border border-slate-800">
                    <button onClick={() => setAdminViewType('day')} className={`px-2 py-1 rounded text-[8px] font-bold uppercase ${adminViewType === 'day' ? 'bg-slate-900 text-purple-400' : 'text-slate-500'}`}>Día</button>
                    <button onClick={() => setAdminViewType('all')} className={`px-2 py-1 rounded text-[8px] font-bold uppercase ${adminViewType === 'all' ? 'bg-slate-900 text-purple-400' : 'text-slate-500'}`}>Todas ({appointments.length})</button>
                  </div>
                </div>

                {adminViewType === 'day' && (
                  <div className="flex space-x-1.5 overflow-x-auto pb-1 custom-scrollbar">
                    {daysList.map(d => <button key={d.isoString} onClick={() => setAdminFilterDate(d.isoString)} className={`px-3 py-2 rounded-xl text-[10px] font-bold border shrink-0 ${adminFilterDate === d.isoString ? 'bg-purple-600 border-purple-500 text-white' : 'bg-slate-950 border-slate-850 text-slate-400'}`}>{d.dayName} {d.dayNumber}</button>)}
                  </div>
                )}

                <div className="space-y-3 max-h-[280px] overflow-y-auto custom-scrollbar pr-1">
                  {filteredAppointments.length === 0 ? (
                    <div className="py-12 text-center text-xs text-slate-600 border border-dashed border-slate-800 rounded-2xl">No hay citas registradas en este negocio todavía.</div>
                  ) : (
                    filteredAppointments.map((app) => (
                      <div key={app.id} className="p-4 bg-slate-900/60 border border-slate-850 rounded-2xl flex items-center justify-between shadow-sm">
                        <div className="space-y-1.5">
                          <p className="text-xs font-bold text-slate-200">{app.nombre_cliente} <span className="text-[9px] font-normal text-slate-500">({app.celular_cliente})</span></p>
                          <div className="flex items-center gap-1.5">
                            <span className="text-[8px] bg-slate-950 text-slate-400 px-2 py-0.5 rounded-md border border-slate-850">{app.fecha_turno}</span>
                            <span className="text-[8px] bg-slate-950 text-purple-400 px-2 py-0.5 rounded-md border border-slate-850 font-medium">{app.hora_turno}</span>
                            {app.valor_cobrado && <span className="text-[8px] bg-emerald-950/40 text-emerald-400 px-2 py-0.5 rounded-md border border-emerald-900/30 font-bold">{formatCurrency(app.valor_cobrado)}</span>}
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          {salesModuleActive && app.estado === 'pending' && <button onClick={() => setCheckoutId(app.id)} className="px-2.5 py-1.5 bg-purple-600 text-white rounded-lg text-[9px] font-bold">Cobrar</button>}
                          <button onClick={() => handleCancelCita(app.id)} className="p-2 text-slate-500 hover:text-rose-400 rounded-xl"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>

              {checkoutId && (
                <div className="bg-slate-900 border border-purple-500/30 p-4 rounded-2xl space-y-3 shadow-xl">
                  <div className="flex justify-between items-center"><p className="text-xs font-bold text-purple-400">💲 Registrar Valor</p><button onClick={() => setCheckoutId(null)} className="text-xs text-slate-500">✕</button></div>
                  <form onSubmit={handleChargeConfirm} className="flex gap-2">
                    <input type="number" required placeholder="Ej. 20000" value={chargeInput} onChange={(e) => setChargeInput(e.target.value)} className="flex-1 px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-200" />
                    <button type="submit" className="px-4 py-2 bg-purple-600 text-white text-xs font-bold rounded-xl">Confirmar</button>
                  </form>
                </div>
              )}
              <button onClick={() => { setIsAuthenticated(false); setBarberiaId(null); }} className="w-full py-3 bg-slate-900 border border-slate-800 text-slate-500 text-xs font-bold rounded-xl">Cerrar Sesión</button>
            </div>
          )}
          <footer className="py-6 text-center text-[9px] text-slate-600 border-t border-slate-900 mt-auto"><p>ZapiCitas Administrador © 2026</p></footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
