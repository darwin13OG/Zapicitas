<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Panel Admin</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // Configuración Supabase
    const SUPABASE_URL = "https://tsasorwwbbscnbvoyyhf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Helpers
    const formatCurrency = (val) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val || 0);

    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        days.push({
          isoString: date.toISOString().split('T')[0],
          dayName: ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][date.getDay()],
          dayNumber: date.getDate()
        });
      }
      return days;
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [isRegisterMode, setIsRegisterMode] = useState(() => {
        const params = new URLSearchParams(window.location.search);
        return params.has('id') || params.get('mode') === 'register';
      });

      const [barberiaId, setBarberiaId] = useState(null);
      const [barberiaName, setBarberiaName] = useState('');
      const [celular, setCelular] = useState('');
      const [password, setPassword] = useState('');
      const [appointments, setAppointments] = useState([]);
      const [copied, setCopied] = useState(false);
      
      const daysList = useMemo(() => getNextSevenDays(), []);
      const [filterDate, setFilterDate] = useState(daysList[0].isoString);

      const fetchCitas = async (id) => {
        const { data } = await supabase.from('citas').select('*').eq('barberia_id', id);
        if (data) setAppointments(data);
      };

      useEffect(() => {
        if (isAuthenticated && barberiaId) {
          fetchCitas(barberiaId);
          const ch = supabase.channel('citas').on('postgres_changes', { event: '*', schema: 'public', table: 'citas' }, () => fetchCitas(barberiaId)).subscribe();
          return () => supabase.removeChannel(ch);
        }
      }, [isAuthenticated, barberiaId]);

      const handleLogin = async (e) => {
        e.preventDefault();
        const { data: b } = await supabase.from('perfil_barberia').select('*').eq('celular', celular.trim()).single();

        if (isRegisterMode) {
          if (b) return alert('Este número ya está registrado.');
          const { data: n } = await supabase.from('perfil_barberia').insert([{ nombre_negocio: barberiaName.trim(), celular: celular.trim(), clave_acceso: password.trim() }]).select().single();
          if (n) { setBarberiaId(n.id); setBarberiaName(n.nombre_negocio); setIsAuthenticated(true); }
        } else {
          if (b && b.clave_acceso === password.trim()) {
            setBarberiaId(b.id); setBarberiaName(b.nombre_negocio); setIsAuthenticated(true);
          } else { alert('Celular o contraseña incorrectos.'); }
        }
      };

      const dailyEarnings = useMemo(() => {
        return appointments.filter(a => a.fecha_turno === filterDate && a.estado === 'paid')
          .reduce((sum, a) => sum + Number(a.valor_cobrado || 0), 0);
      }, [appointments, filterDate]);

      const clientLink = `${window.location.origin}/reserva?id=${barberiaId}`;

      if (!isAuthenticated) return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-center px-6">
          <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl space-y-6">
            <header className="text-center">
              <h1 className="text-2xl font-bold">{isRegisterMode ? "📝 Crea tu cuenta" : "Panel Administrador"}</h1>
              <p className="text-xs text-slate-500 mt-1">{isRegisterMode ? "Completa los datos de tu barbería" : "Ingresa tus credenciales"}</p>
            </header>
            <form onSubmit={handleLogin} className="space-y-4">
              {isRegisterMode && <input type="text" placeholder="Nombre de la Barbería" required value={barberiaName} onChange={e=>setBarberiaName(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:border-purple-600" />}
              <input type="tel" placeholder="Número de Celular" required value={celular} onChange={e=>setCelular(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:border-purple-600" />
              <input type="password" placeholder="Contraseña de acceso" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:border-purple-600" />
              <button className="w-full py-4 bg-purple-600 hover:bg-purple-700 rounded-xl font-bold shadow-lg shadow-purple-600/20">{isRegisterMode ? "Finalizar y Entrar" : "Entrar al Panel"}</button>
            </form>
            <button onClick={()=>setIsRegisterMode(!isRegisterMode)} className="w-full text-xs text-purple-400 hover:underline">
              {isRegisterMode ? "¿Ya tienes cuenta? Inicia Sesión" : "¿Acabas de pagar? Regístrate aquí"}
            </button>
          </div>
        </div>
      );

      return (
        <div className="max-w-md mx-auto p-4 space-y-6">
          <header className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
            <div>
              <h2 className="font-bold text-white">💈 {barberiaName}</h2>
              <p className="text-[10px] text-slate-500">Panel de Control</p>
            </div>
            <button onClick={()=>location.reload()} className="text-[10px] bg-slate-800 px-3 py-1 rounded-lg">Salir</button>
          </header>

          <div className="bg-gradient-to-br from-purple-900/30 to-slate-900 p-5 rounded-3xl border border-purple-500/20 text-center space-y-3">
            <span className="text-[10px] font-bold text-purple-300 uppercase tracking-widest">Link para Instagram</span>
            <div className="bg-slate-950 p-3 rounded-xl border border-slate-800 text-[10px] font-mono truncate text-slate-400">{clientLink}</div>
            <button onClick={()=>{navigator.clipboard.writeText(clientLink); setCopied(true); setTimeout(()=>setCopied(false),2000)}} className="w-full py-2.5 bg-purple-600 rounded-xl text-xs font-bold transition-all">
              {copied ? "¡COPIADO CON ÉXITO! ✓" : "COPIAR LINK PARA CLIENTES"}
            </button>
          </div>

          <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
            <div className="flex justify-between items-end">
              <span className="text-[10px] font-bold text-slate-500 uppercase">Ventas de Hoy</span>
              <span className="text-xl font-black text-emerald-400">{formatCurrency(dailyEarnings)}</span>
            </div>
          </div>

          <div className="space-y-4">
            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              {daysList.map(d => (
                <button key={d.isoString} onClick={()=>setFilterDate(d.isoString)} className={`flex-shrink-0 px-4 py-2 rounded-xl border text-[10px] font-bold transition-all ${filterDate === d.isoString ? 'bg-purple-600 border-purple-500' : 'bg-slate-900 border-slate-800 text-slate-500'}`}>
                  {d.dayName} {d.dayNumber}
                </button>
              ))}
            </div>

            <div className="space-y-2">
              <h3 className="text-xs font-bold text-slate-400 px-1 uppercase">Citas para este día:</h3>
              {appointments.filter(a=>a.fecha_turno === filterDate).length === 0 ? (
                <div className="py-10 text-center text-xs text-slate-600">No hay citas agendadas</div>
              ) : (
                appointments.filter(a=>a.fecha_turno === filterDate).map(app => (
                  <div key={app.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                    <div>
                      <p className="text-sm font-bold">{app.nombre_cliente}</p>
                      <p className="text-[10px] text-purple-400 font-bold">{app.hora_turno}</p>
                    </div>
                    <div className="flex gap-2">
                      {!app.valor_cobrado ? (
                        <button onClick={async ()=>{
                          const val = prompt('Valor cobrado:');
                          if(val) { await supabase.from('citas').update({ estado: 'paid', valor_cobrado: Number(val) }).eq('id', app.id); fetchCitas(barberiaId); }
                        }} className="bg-emerald-600 text-[10px] px-3 py-1.5 rounded-lg font-bold">Cobrar</button>
                      ) : (
                        <span className="text-emerald-400 text-[10px] font-bold">{formatCurrency(app.valor_cobrado)}</span>
                      )}
                      <button onClick={async ()=>{if(confirm('¿Borrar cita?')){await supabase.from('citas').delete().eq('id',app.id); fetchCitas(barberiaId)}} } className="text-slate-600 px-2">✕</button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
