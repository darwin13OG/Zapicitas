<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZapiCitas | Panel de Administración</title>
  
  <!-- Tailwind CSS v4 -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- React & Babel para la interactividad en el celular -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      height: 4px;
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(147, 51, 234, 0.3);
      border-radius: 2px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <div id="root"></div>

  <!-- Lógica interna del Panel basada en tu prototipo -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    const START_HOUR = 8;          // 8:00 AM[cite: 1]
    const END_HOUR = 18;          // 6:00 PM[cite: 1]
    const SLOT_INTERVAL = 30;     // Bloques de 30 minutos[cite: 1]

    // Generador de horarios[cite: 1]
    const generate30MinSlots = (start, end) => {
      const slots = [];
      let currentMinutes = start * 60;
      const endMinutes = end * 60;
      while (currentMinutes + SLOT_INTERVAL <= endMinutes) {
        const hour = Math.floor(currentMinutes / 60);
        const minute = currentMinutes % 60;
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        const displayMinute = minute.toString().padStart(2, '0');
        const formatted = `${displayHour.toString().padStart(2, '0')}:${displayMinute} ${ampm}`;
        const rawValue = `${hour.toString().padStart(2, '0')}:${displayMinute}`;
        slots.push({ formatted, rawValue });
        currentMinutes += SLOT_INTERVAL;
      }
      return slots;
    };

    const getSpanishDayName = (date) => {
      const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
      return days[date.getDay()];
    };

    const getSpanishMonthName = (date) => {
      const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
      return months[date.getMonth()];
    };

    const getNextSevenDays = () => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        days.push({
          isoString: `${yyyy}-${mm}-${dd}`,
          dayName: getSpanishDayName(date),
          dayNumber: date.getDate(),
          monthName: getSpanishMonthName(date)
        });
      }
      return days;
    };

    const formatCurrency = (val) => {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0
      }).format(val || 0);
    };

    function App() {
      // Control de autenticación simulada (Estado A y B)[cite: 1]
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [barberiaName, setBarberiaName] = useState('');
      const [celular, setCelular] = useState('');
      const [password, setPassword] = useState('');

      const daysList = useMemo(() => getNextSevenDays(), []);
      const timeSlots = useMemo(() => generate30MinSlots(START_HOUR, END_HOUR), []);

      // Base de datos simulada de citas compartida[cite: 1]
      const [appointments, setAppointments] = useState([
        { id: '1', name: 'Carlos Mendoza', phone: '3124567890', date: daysList[0].isoString, timeSlot: '09:00 AM', chargeValue: 20000, status: 'paid' }, //[cite: 1]
        { id: '2', name: 'Mateo Restrepo', phone: '3159876543', date: daysList[0].isoString, timeSlot: '11:30 AM', chargeValue: null, status: 'pending' }, //[cite: 1]
        { id: '3', name: 'Juan Gómez', phone: '3001112233', date: daysList[1].isoString, timeSlot: '02:00 PM', chargeValue: null, status: 'pending' } //[cite: 1]
      ]);

      // Estados del Panel[cite: 1]
      const [salesModuleActive, setSalesModuleActive] = useState(true); //[cite: 1]
      const [adminFilterDate, setAdminFilterDate] = useState(daysList[0].isoString); //[cite: 1]
      const [adminViewType, setAdminViewType] = useState('day'); // 'day' | 'all'[cite: 1]
      const [showManualForm, setShowManualForm] = useState(false); //[cite: 1]

      // Formulario manual[cite: 1]
      const [manualName, setManualName] = useState(''); //[cite: 1]
      const [manualPhone, setManualPhone] = useState(''); //[cite: 1]
      const [manualDate, setManualDate] = useState(daysList[0].isoString); //[cite: 1]
      const [manualTime, setManualTime] = useState(''); //[cite: 1]

      // Control de Cobro Pasarela Flotante[cite: 1]
      const [checkoutId, setCheckoutId] = useState(null); //[cite: 1]
      const [chargeInput, setChargeInput] = useState(''); //[cite: 1]

      // Cálculos Financieros (Módulo de Ventas)[cite: 1]
      const dailyEarnings = useMemo(() => {
        return appointments
          .filter(app => app.date === adminFilterDate && app.status === 'paid') //[cite: 1]
          .reduce((sum, app) => sum + Number(app.chargeValue), 0); //[cite: 1]
      }, [appointments, adminFilterDate]);

      const monthlyEarnings = useMemo(() => {
        const monthPrefix = adminFilterDate.slice(0, 7); //[cite: 1]
        return appointments
          .filter(app => app.date.startsWith(monthPrefix) && app.status === 'paid') //[cite: 1]
          .reduce((sum, app) => sum + Number(app.chargeValue), 0); //[cite: 1]
      }, [appointments, adminFilterDate]);

      const filteredAppointments = useMemo(() => {
        let list = appointments;
        if (adminViewType === 'day') {
          list = appointments.filter(app => app.date === adminFilterDate); //[cite: 1]
        }
        return [...list].sort((a, b) => a.date.localeCompare(b.date) || a.timeSlot.localeCompare(b.timeSlot)); //[cite: 1]
      }, [appointments, adminFilterDate, adminViewType]);

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (barberiaName.trim() && password === '1234') { //[cite: 1]
          setIsAuthenticated(true);
        } else {
          alert('Por favor introduce el nombre de tu negocio y la clave "1234" para la prueba.');
        }
      };

      const handleManualSubmit = (e) => {
        e.preventDefault();
        if (!manualName.trim() || !manualPhone.trim() || !manualTime) return; //[cite: 1]
        const newApp = {
          id: `manual-${Date.now()}`,
          name: manualName.trim(),
          phone: manualPhone.trim(),
          date: manualDate,
          timeSlot: manualTime,
          chargeValue: null,
          status: 'pending'
        }; //[cite: 1]
        setAppointments(prev => [...prev, newApp]); //[cite: 1]
        setManualName(''); setManualPhone(''); setManualTime(''); setShowManualForm(false); //[cite: 1]
      };

      const handleCancelCita = (id) => {
        if (window.confirm('¿Deseas cancelar esta cita de la agenda?')) { //[cite: 1]
          setAppointments(prev => prev.filter(app => app.id !== id)); //[cite: 1]
        }
      };

      const handleChargeConfirm = (e) => {
        e.preventDefault();
        if (!chargeInput) return; //[cite: 1]
        setAppointments(prev => prev.map(app => {
          if (app.id === checkoutId) {
            return { ...app, chargeValue: Number(chargeInput), status: 'paid' }; //[cite: 1]
          }
          return app; //[cite: 1]
        }));
        setCheckoutId(null); setChargeInput(''); //[cite: 1]
      };

      return (
        <div className="max-w-md mx-auto w-full px-4 py-6 flex flex-col min-h-screen justify-between">
          
          {/* =======================================================
              ESTADO A: REGISTRO / INICIO DE SESIÓN
              ======================================================= */}
          {!isAuthenticated ? (
            <div className="my-auto py-8 px-6 bg-slate-900/40 border border-slate-900 rounded-3xl space-y-6">
              <div className="text-center space-y-2">
                <h1 className="text-2xl font-extrabold text-white tracking-tight">Acceso a tu Agenda</h1>
                <p class="text-xs text-slate-400">Registra o ingresa con los datos de tu barbería.</p>
              </div>

              <form onSubmit={handleLoginSubmit} className="space-y-4">
                <div class="flex flex-col gap-1.5">
                  <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Nombre de la Barbería</label>
                  <input 
                    type="text" 
                    required
                    placeholder="Ej. Barbería El Tigre"
                    value={barberiaName}
                    onChange={(e) => setBarberiaName(e.target.value)}
                    className="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-sm outline-none text-slate-100 transition-all"
                  />
                </div>

                <div class="flex flex-col gap-1.5">
                  <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Celular de Contacto</label>
                  <input 
                    type="tel" 
                    placeholder="Ej. 3124567890"
                    value={celular}
                    onChange={(e) => setCelular(e.target.value)}
                    className="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-sm outline-none text-slate-100 transition-all"
                  />
                </div>

                <div class="flex flex-col gap-1.5">
                  <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Contraseña (Prueba: 1234)</label>
                  <input 
                    type="password" 
                    required
                    placeholder="••••••••"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 focus:border-purple-500 rounded-xl text-sm outline-none text-slate-100 text-center tracking-widest"
                  />
                </div>

                <button type="submit" className="w-full py-4 mt-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-2xl text-sm shadow-lg shadow-purple-600/20 transition-all">
                  Ingresar al Panel
                </button>
              </form>
            </div>
          ) : (
            
            // =======================================================
            // ESTADO B: PANEL DE CONTROL DE ADMINISTRACIÓN PREMIUM
            // =======================================================
            <div className="space-y-6">
              
              {/* Cabecera Principal */}
              <div className="flex items-center justify-between bg-slate-900/40 border border-slate-900 p-4 rounded-2xl">
                <div>
                  <h2 className="text-base font-bold text-white truncate max-w-[180px]">💈 {barberiaName}</h2>
                  <span className="text-[10px] text-purple-400 font-medium">Suscripción Activa</span>
                </div>
                
                {/* Interruptor Estilizado del Módulo de Ventas[cite: 1] */}
                <div className="flex items-center gap-2 bg-slate-950 px-2.5 py-1.5 rounded-xl border border-slate-850">
                  <span className="text-[8px] text-slate-400 font-bold uppercase tracking-wider">Caja</span>
                  <button 
                    onClick={() => setSalesModuleActive(!salesModuleActive)} //[cite: 1]
                    className={`w-8 h-5 rounded-full p-0.5 transition-all flex items-center ${salesModuleActive ? 'bg-purple-600 justify-end' : 'bg-slate-800 justify-start'}`} //[cite: 1]
                  >
                    <span className="w-4 h-4 rounded-full bg-white shadow-sm block"></span>
                  </button>
                </div>
              </div>

              {/* Estadísticas de Finanzas Premium[cite: 1] */}
              {salesModuleActive && ( //[cite: 1]
                <div class="grid grid-cols-2 gap-3">
                  <div class="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-4">
                    <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider block">Caja de Hoy</span>
                    <span class="text-base font-extrabold text-white block mt-1">{formatCurrency(dailyEarnings)}</span>
                  </div>
                  <div class="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-4">
                    <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider block">Caja Mensual</span>
                    <span class="text-base font-extrabold text-emerald-400 block mt-1">{formatCurrency(monthlyEarnings)}</span>
                  </div>
                </div>
              )}

              {/* Añadir Turno Manual[cite: 1] */}
              <div className="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 space-y-3">
                <button 
                  onClick={() => setShowManualForm(!showManualForm)} //[cite: 1]
                  className="w-full flex items-center justify-between text-xs font-bold text-slate-300"
                >
                  <span className="flex items-center gap-2">
                    <span className="h-2 w-2 rounded-full bg-purple-500 animate-pulse"></span>
                    Agendar Cita Manualmente
                  </span>
                  <span class="text-lg text-purple-400">{showManualForm ? '−' : '＋'}</span>
                </button>

                {showManualForm && ( //[cite: 1]
                  <form onSubmit={handleManualSubmit} className="space-y-4 pt-3 border-t border-slate-850/60">
                    <input 
                      type="text" required placeholder="Nombre del cliente" value={manualName}
                      onChange={(e) => setManualName(e.target.value)}
                      className="w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-200"
                    />
                    <input 
                      type="tel" required placeholder="Teléfono móvil" value={manualPhone}
                      onChange={(e) => setManualPhone(e.target.value)}
                      className="w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-200"
                    />

                    <div className="space-y-1">
                      <label className="block text-[8px] text-slate-500 uppercase tracking-wider font-bold">Fecha del Turno</label>
                      <select
                        value={manualDate} onChange={(e) => { setManualDate(e.target.value); setManualTime(''); }}
                        className="w-full px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-400"
                      >
                        {daysList.map(d => (
                          <option key={d.isoString} value={d.isoString}>{d.dayName} {d.dayNumber} - {d.monthName}</option>
                        ))}
                      </select>
                    </div>

                    <div className="space-y-1.5">
                      <label className="block text-[8px] text-slate-500 uppercase tracking-wider font-bold">Horas Libres</label>
                      <div className="grid grid-cols-3 gap-1 max-h-[120px] overflow-y-auto custom-scrollbar p-1 bg-slate-950 rounded-xl border border-slate-850">
                        {timeSlots.map(slot => {
                          const isBooked = appointments.some(app => app.date === manualDate && app.timeSlot === slot.formatted);
                          const isSelected = manualTime === slot.formatted;
                          if (isBooked) return <div key={slot.rawValue} className="p-2 border border-slate-900 bg-slate-900/20 text-slate-700 text-[9px] text-center line-through rounded-lg select-none">Ocupado</div>;
                          return (
                            <button
                              key={slot.rawValue} type="button" onClick={() => setManualTime(slot.formatted)}
                              className={`p-2 border rounded-lg text-[9px] font-bold text-center transition-all ${isSelected ? 'bg-purple-600/20 border-purple-500 text-purple-300' : 'bg-slate-950 border-slate-850 text-slate-400'}`}
                            >
                              {slot.formatted}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    <button type="submit" className="w-full py-2.5 bg-purple-600 text-white text-xs font-bold rounded-xl shadow">
                      Guardar en Agenda
                    </button>
                  </form>
                )}
              </div>

              {/* Listado Principal de Citas (Nunca Apiñadas)[cite: 1] */}
              <div className="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 space-y-4">
                <div className="flex items-center justify-between">
                  <span className="text-xs font-bold text-slate-300">Agenda de Reservas</span>
                  
                  {/* Filtro de vista[cite: 1] */}
                  <div className="flex bg-slate-950 p-0.5 rounded-lg border border-slate-800">
                    <button
                      onClick={() => setAdminViewType('day')}
                      className={`px-2 py-1 rounded text-[8px] font-bold uppercase transition-all ${adminViewType === 'day' ? 'bg-slate-900 text-purple-400' : 'text-slate-500'}`}
                    >
                      Día
                    </button>
                    <button
                      onClick={() => setAdminViewType('all')}
                      className={`px-2 py-1 rounded text-[8px] font-bold uppercase transition-all ${adminViewType === 'all' ? 'bg-slate-900 text-purple-400' : 'text-slate-500'}`}
                    >
                      Todas ({appointments.length})
                    </button>
                  </div>
                </div>

                {/* Filtro de fechas horizontal[cite: 1] */}
                {adminViewType === 'day' && (
                  <div className="flex space-x-1.5 overflow-x-auto pb-1 custom-scrollbar">
                    {daysList.map(d => (
                      <button
                        key={d.isoString} onClick={() => setAdminFilterDate(d.isoString)}
                        className={`px-3 py-2 rounded-xl text-[10px] font-bold border shrink-0 transition-all ${adminFilterDate === d.isoString ? 'bg-purple-600 border-purple-500 text-white' : 'bg-slate-950 border-slate-850 text-slate-400'}`}
                      >
                        {d.dayName} {d.dayNumber}
                      </button>
                    ))}
                  </div>
                )}

                {/* Listado de Tarjetas Deslizables */}
                <div className="space-y-3 max-h-[280px] overflow-y-auto custom-scrollbar pr-1">
                  {filteredAppointments.length === 0 ? (
                    <div className="py-12 text-center text-xs text-slate-600 border border-dashed border-slate-800 rounded-2xl">
                      No hay citas programadas.
                    </div>
                  ) : (
                    filteredAppointments.map((app) => (
                      <div key={app.id} className="p-4 bg-slate-900/60 border border-slate-850 rounded-2xl flex items-center justify-between shadow-sm">
                        <div className="space-y-1.5">
                          <p className="text-xs font-bold text-slate-200">
                            {app.name} <span className="text-[9px] font-normal text-slate-500">({app.phone})</span>
                          </p>
                          <div className="flex flex-wrap items-center gap-1.5">
                            <span className="text-[8px] bg-slate-950 text-slate-400 px-2 py-0.5 rounded-md border border-slate-850">{app.date}</span>
                            <span className="text-[8px] bg-slate-950 text-purple-400 px-2 py-0.5 rounded-md border border-slate-850 font-medium">{app.timeSlot}</span>
                            {app.chargeValue && (
                              <span className="text-[8px] bg-emerald-950/40 text-emerald-400 px-2 py-0.5 rounded-md border border-emerald-900/30 font-bold">
                                {formatCurrency(app.chargeValue)}
                              </span>
                            )}
                          </div>
                        </div>

                        <div className="flex items-center gap-2">
                          {salesModuleActive && app.status === 'pending' && ( //[cite: 1]
                            <button
                              onClick={() => setCheckoutId(app.id)} //[cite: 1]
                              className="px-2.5 py-1.5 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-[9px] font-bold transition-all shadow-sm"
                            >
                              Cobrar
                            </button>
                          )}
                          
                          <button
                            onClick={() => handleCancelCita(app.id)} //[cite: 1]
                            className="p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-950/30 border border-transparent hover:border-rose-900/20 rounded-xl transition-all"
                          >
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                          </button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>

              {/* Tarjeta de Cobro Flotante Inferior[cite: 1] */}
              {checkoutId && ( //[cite: 1]
                <div className="bg-slate-900 border border-purple-500/30 p-4 rounded-2xl space-y-3 animate-fadeIn shadow-xl">
                  <div className="flex justify-between items-center">
                    <p className="text-xs font-bold text-purple-400">💲 Registrar Valor del Servicio</p>
                    <button onClick={() => setCheckoutId(null)} className="text-xs text-slate-500 hover:text-slate-300">✕</button>
                  </div>
                  <form onSubmit={handleChargeConfirm} className="flex gap-2">
                    <input 
                      type="number" required placeholder="Ej. 20000" value={chargeInput}
                      onChange={(e) => setChargeInput(e.target.value)}
                      className="flex-1 px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none text-slate-200"
                    />
                    <button type="submit" className="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold rounded-xl transition-all">
                      Confirmar
                    </button>
                  </form>
                </div>
              )}

              {/* Botón Salida */}
              <button
                onClick={() => { setIsAuthenticated(false); }}
                className="w-full py-3 bg-slate-900 hover:bg-slate-850 border border-slate-800 text-slate-500 hover:text-slate-400 text-xs font-bold rounded-xl transition-all"
              >
                Cerrar Sesión Administrador
              </button>
            </div>
          )}

          <footer className="py-6 text-center text-[9px] text-slate-600 border-t border-slate-900 mt-auto">
            <p>ZapiCitas Administrador © 2026</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
