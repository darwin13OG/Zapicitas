<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin | ZapiCitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
  <div id="app" v-cloak>
    <!-- LOGIN -->
    <div v-if="!auth" class="max-w-md mx-auto py-20 px-6">
      <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 space-y-6">
        <h2 class="text-2xl font-bold text-center">Acceso Administrador</h2>
        <form @submit.prevent="handleAuth" class="space-y-4">
          <input v-model="form.tel" type="tel" placeholder="Celular" required class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none">
          <input v-model="form.pass" type="password" placeholder="Contraseña" required class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none">
          <button type="submit" class="w-full py-4 bg-purple-600 rounded-xl font-bold">ENTRAR</button>
        </form>
      </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div v-else class="max-w-md mx-auto p-4 space-y-6 animate-in fade-in duration-500">
      <header class="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center shadow-xl">
        <div>
          <h2 class="font-bold text-white leading-tight">{{ bizName }}</h2>
          <button @click="showConfig = !showConfig" class="text-[9px] text-purple-400 font-bold uppercase tracking-widest mt-1">⚙️ Ajustes de Agenda</button>
        </div>
        <button @click="togglePausa" :class="estaPausado ? 'bg-rose-600' : 'bg-emerald-600'" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase">
          {{ estaPausado ? 'Pausado' : 'Activo' }}
        </button>
      </header>

      <!-- CONFIGURACION DE HORARIOS -->
      <div v-if="showConfig" class="bg-slate-900 p-6 rounded-3xl border border-purple-500/30 space-y-4 animate-in zoom-in duration-300">
        <h3 class="text-xs font-bold uppercase text-purple-300">Configuración de Agenda</h3>
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[9px] text-slate-500 uppercase font-bold">Abre a las:</label>
            <input v-model="config.inicio" type="time" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl text-xs">
          </div>
          <div class="space-y-1">
            <label class="text-[9px] text-slate-500 uppercase font-bold">Cierra a las:</label>
            <input v-model="config.fin" type="time" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl text-xs">
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-[9px] text-slate-500 uppercase font-bold">Duración de cada cita:</label>
          <select v-model="config.duracion" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white">
            <option :value="30">30 Minutos</option>
            <option :value="45">45 Minutos</option>
            <option :value="60">1 Hora (Recomendado)</option>
            <option :value="90">1 Hora y 30 Minutos</option>
          </select>
        </div>
        <button @click="saveConfig" class="w-full py-3 bg-purple-600 rounded-xl text-xs font-bold">GUARDAR CAMBIOS</button>
      </div>

      <!-- VENTAS -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800">
          <span class="text-[9px] text-slate-500 font-bold uppercase block mb-1">Hoy</span>
          <span class="text-xl font-black">${{ salesToday.toLocaleString() }}</span>
        </div>
        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800">
          <span class="text-[9px] text-slate-500 font-bold uppercase block mb-1">Este Mes</span>
          <span class="text-xl font-black text-emerald-400">${{ salesMonth.toLocaleString() }}</span>
        </div>
      </div>

      <!-- LISTA DE CITAS -->
      <div class="space-y-3">
        <div class="flex justify-between items-center px-1">
          <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Citas de Hoy</h3>
          <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
        </div>
        <div v-if="citasHoy.length === 0" class="py-10 text-center text-xs text-slate-600 bg-slate-900/20 rounded-3xl border border-dashed border-slate-800 italic">No hay citas registradas para hoy.</div>
        <div v-for="c in citasHoy" :key="c.id" class="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center shadow-md">
          <div>
            <p class="text-sm font-bold text-white leading-none">{{ c.nombre_cliente }}</p>
            <p class="text-[10px] text-purple-400 font-bold mt-2 uppercase tracking-tighter">{{ c.hora_turno }}</p>
          </div>
          <div class="flex gap-2">
            <button v-if="!c.valor_cobrado" @click="cobrar(c.id)" class="bg-emerald-600 text-[9px] px-3 py-2 rounded-xl font-bold uppercase">Cobrar</button>
            <span v-else class="text-emerald-400 font-black text-xs">${{ c.valor_cobrado.toLocaleString() }}</span>
            <button @click="eliminar(c.id)" class="text-slate-600 px-1 text-lg">✕</button>
          </div>
        </div>
      </div>
      
      <button @click="logout" class="w-full py-4 text-[9px] font-bold text-slate-700 uppercase tracking-[0.3em]">Cerrar Sesión</button>
    </div>
  </div>

  <style>[v-cloak] { display: none; }</style>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;
    const sb = supabase.createClient("https://tsasorwwbbscnbvoyyhf.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXNvcnd3YmJzY25idm95eWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTg5NjEsImV4cCI6MjA5NzE3NDk2MX0.-A0fl15WmXcnU-81iUazvy-GBrS22ktaKcoQx56jmZ8");

    createApp({
      setup() {
        const auth = ref(false);
        const bizId = ref(null);
        const bizName = ref('');
        const estaPausado = ref(false);
        const citas = ref([]);
        const showConfig = ref(false);
        const form = ref({ tel: '', pass: '' });
        const config = ref({ inicio: '08:00', fin: '18:00', duracion: 60 });

        const salesToday = computed(() => {
          const hoy = new Date().toISOString().split('T')[0];
          return citas.value.filter(c => c.fecha_turno === hoy && c.estado === 'paid').reduce((acc, c) => acc + Number(c.valor_cobrado), 0);
        });

        const salesMonth = computed(() => {
          const mes = new Date().toISOString().slice(0, 7);
          return citas.value.filter(c => c.fecha_turno.startsWith(mes) && c.estado === 'paid').reduce((acc, c) => acc + Number(c.valor_cobrado), 0);
        });

        const citasHoy = computed(() => {
          const hoy = new Date().toISOString().split('T')[0];
          return citas.value.filter(c => c.fecha_turno === hoy).sort((a,b) => a.hora_turno.localeCompare(b.hora_turno));
        });

        const handleAuth = async () => {
          const { data: x } = await sb.from('perfil_barberia').select('*').eq('celular', form.value.tel).single();
          if(x && x.clave_acceso === form.value.pass) {
            bizId.value = x.id; bizName.value = x.nombre_negocio; estaPausado.value = x.esta_pausado;
            config.value = { inicio: x.hora_inicio, fin: x.hora_fin, duracion: x.duracion_minutos };
            auth.value = true;
            fetchTodo();
            listenRealtime();
          } else { alert("Acceso denegado."); }
        };

        const listenRealtime = () => {
          sb.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'citas', filter: `barberia_id=eq.${bizId.value}` }, () => {
              fetchTodo();
            }).subscribe();
        };

        const fetchTodo = async () => {
          const { data } = await sb.from('citas').select('*').eq('barberia_id', bizId.value);
          if(data) citas.value = data;
        };

        const saveConfig = async () => {
          await sb.from('perfil_barberia').update({
            hora_inicio: config.value.inicio,
            hora_fin: config.value.fin,
            duracion_minutos: config.value.duracion
          }).eq('id', bizId.value);
          showConfig.value = false;
          alert("Agenda actualizada.");
        };

        const togglePausa = async () => {
          estaPausado.value = !estaPausado.value;
          await sb.from('perfil_barberia').update({ esta_pausado: estaPausado.value }).eq('id', bizId.value);
        };

        const cobrar = async (id) => {
          const val = prompt('Monto cobrado:');
          if(val) {
            await sb.from('citas').update({ valor_cobrado: Number(val), estado: 'paid' }).eq('id', id);
            fetchTodo();
          }
        };

        const eliminar = async (id) => {
          if(confirm('¿Eliminar cita?')) { await sb.from('citas').delete().eq('id', id); fetchTodo(); }
        };

        const logout = () => location.reload();

        return { auth, bizName, estaPausado, salesToday, salesMonth, citasHoy, form, showConfig, config, handleAuth, togglePausa, cobrar, eliminar, logout, saveConfig };
      }
    }).mount('#app');
  </script>
</body>
</html>
